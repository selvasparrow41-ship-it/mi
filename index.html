<!DOCTYPE html>

<head>

    :root {

      --text-muted: #64748b;

      height: 44px;
      padding: 0;

      align-items: center;
      justify-content: center;

      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      cursor: pointer;
      transition: all var(--transition-speed) ease;
    }

    .btn-icon:hover {
      transform: scale(1.08) rotate(15deg);
      background-color: var(--bg-tertiary);
      border-color: var(--accent-primary);
    }

    .pulse-indicator {
      width: 10px;
      height: 10px;
      background-color: #10b981;
      border-radius: 50%;
      display: inline-block;
      position: relative;
    }

    .pulse-indicator::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background-color: #10b981;
      animation: pulse-ring 1.8s cubic-bezier(0.24, 0, 0.38, 1) infinite;

      0% {
        transform: scale(0.5);
        opacity: 1;
      }

      100% {
        transform: scale(2.8);
        opacity: 0;
      }

      background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-primary) 100%);

      -webkit-text-fill-color: transparent;

              status: 'confirmed'

            resolve(newBooking);

                <h2 style={{ fontSize: '2rem', marginBottom: '16px' }}>Certified Mixer Grinder Gurus</h2>
                <p style={{ color: 'var(--text-secondary)', marginBottom: '24px' }}>Track scheduling availability in real time. Tabletop stone calibrations, carbon brush tuning, and motor armature rewinds done instantly.</p>
                <button onClick={() => setCurrentPage('booking')} className="btn btn-secondary">Select Expert Technician</button>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                {technicians.map(t => (
                  <div key={t.id} className="glass tech-card-hover" style={{ padding: '16px', borderRadius: 'var(--border-radius-md)', display: 'flex', gap: '16px', alignItems: 'center' }}>
                    <img src={t.avatar} alt={t.name} style={{ width: '56px', height: '56px', borderRadius: '50%', objectFit: 'cover', border: '2px solid #ff9933' }} />
                    <div style={{ flex: 1 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                        <h4 style={{ fontWeight: '700' }}>{t.name}</h4>
                        <span style={{ fontSize: '0.75rem', padding: '2px 8px', borderRadius: '10px', backgroundColor: t.status === 'available' ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)', color: t.status === 'available' ? '#10b981' : '#ef4444' }}>{t.status}</span>
                      </div>
                      <span style={{ fontSize: '0.8rem', color: '#ff9933' }}>{t.specialty.join(', ')}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        </div>
      );
    };

    // Services View
    const ServicesView = ({ setCurrentPage, setPreselectAppliance }) => {
      const [activeTab, setActiveTab] = useState('all');

      return (
        <div style={{ padding: '64px 0 80px 0' }} className="container">
          <div style={{ textAlign: 'center', marginBottom: '48px' }}>
            <h1 style={{ fontSize: '2.5rem' }}>Transparent Pricing Tiers</h1>
            <p style={{ color: 'var(--text-secondary)', marginTop: '8px' }}>Choose the service speed and depth of diagnostic restoring required.</p>
          </div>

          <div style={{ display: 'flex', justifyContent: 'center', gap: '12px', marginBottom: '40px' }}>
            {['all', 'mixie', 'wet_grinder', 'juicer'].map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)} className="btn" style={{
                borderRadius: '30px', padding: '8px 20px', fontSize: '0.85rem',
                backgroundColor: activeTab === tab ? '#ff9933' : 'var(--bg-secondary)',
                color: activeTab === tab ? '#fff' : 'var(--text-secondary)'
              }}>{tab === 'all' ? 'All Appliances' : tab === 'mixie' ? 'Mixies' : tab === 'wet_grinder' ? 'Wet Grinders' : 'Juicers'}</button>
            ))}
          </div>

          <div className="services-grid">
            {serviceDetails.filter(s => activeTab === 'all' || s.type === activeTab).map(s => (
              <div key={s.id} className="glass" style={{ borderRadius: 'var(--border-radius-lg)', padding: '24px', display: 'flex', flexDirection: 'column', gap: '16px' }}>
                <h3 style={{ fontSize: '1.25rem' }}>{s.name}</h3>
                <p style={{ color: 'var(--text-secondary)', fontSize: '0.9rem' }}>{s.description}</p>

                <div style={{ marginTop: 'auto' }}>
                  <h4 style={{ fontSize: '0.85rem', color: 'var(--text-muted)', marginBottom: '8px' }}>Pricing Tiers</h4>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                    {s.tiers.map(t => (
                      <div key={t.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px', border: '1px solid var(--glass-border)', borderRadius: '8px' }}>
                        <span>{t.name} ({t.turnaround})</span>
                        <strong style={{ color: '#ff9933' }}>{t.price}</strong>
                      </div>
                    ))}
                  </div>
                </div>

                <button onClick={() => {
                  setPreselectAppliance({ type: s.type, tier: s.tiers[1].id });
                  setCurrentPage('booking');
                }} className="btn btn-primary" style={{ marginTop: '16px', backgroundColor: '#ff9933' }}>Book Seva</button>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // Booking View
    const BookingView = ({ preselectAppliance }) => {
      const { createBooking, isSubmitting } = useContext(BookingContext);
      const [wizardStep, setWizardStep] = useState(1);
      const [receipt, setReceipt] = useState(null);

      const [formData, setFormData] = useState({
        clientName: '', clientEmail: '', clientPhone: '',
        applianceType: preselectAppliance?.type || 'mixie',
        applianceBrand: '', issueDescription: '',
        preferredDate: '', preferredTimeSlot: '', serviceArea: ''
      });

      const [errors, setErrors] = useState({});

      const validate = () => {
        const newErrors = {};
        if (!formData.clientName) newErrors.clientName = 'Name is required';
        if (!formData.clientEmail.includes('@')) newErrors.clientEmail = 'Enter a valid email';
        if (formData.clientPhone.length < 10) newErrors.clientPhone = 'Enter a 10-digit mobile number';
        if (!formData.applianceBrand) newErrors.applianceBrand = 'Appliance brand/model is required';
        if (formData.issueDescription.length < 5) newErrors.issueDescription = 'Describe issue in detail';
        if (!formData.preferredDate) newErrors.preferredDate = 'Date is required';
        if (!formData.preferredTimeSlot) newErrors.preferredTimeSlot = 'Time is required';
        if (!formData.serviceArea) newErrors.serviceArea = 'Region is required';
        return newErrors;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        const validationErrors = validate();
        if (Object.keys(validationErrors).length > 0) {
          setErrors(validationErrors);
          return;
        }
        setErrors({});
        const ticket = await createBooking(formData);
        setReceipt(ticket);
        setWizardStep(2);
      };

      return (
        <div style={{ padding: '64px 0 80px 0' }} className="container">
          {wizardStep === 1 ? (
            <div style={{ maxWidth: '600px', margin: '0 auto' }}>
              <h1 style={{ textAlign: 'center', marginBottom: '24px' }}>Book Seva Appointment</h1>

              <form onSubmit={handleSubmit} className="glass" style={{ padding: '32px', borderRadius: 'var(--border-radius-lg)', display: 'flex', flexDirection: 'column', gap: '20px' }}>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                  <label>Full Name</label>
                  <input type="text" placeholder="Sivamurugan" value={formData.clientName} onChange={e => setFormData({ ...formData, clientName: e.target.value })} style={inpStyle(errors.clientName)} />
                  {errors.clientName && <span style={{ color: '#ef4444', fontSize: '0.8rem' }}>{errors.clientName}</span>}
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                  <label>Email Address</label>
                  <input type="email" placeholder="sivamurugan@gmail.com" value={formData.clientEmail} onChange={e => setFormData({ ...formData, clientEmail: e.target.value })} style={inpStyle(errors.clientEmail)} />
                  {errors.clientEmail && <span style={{ color: '#ef4444', fontSize: '0.8rem' }}>{errors.clientEmail}</span>}
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                  <label>10-Digit Mobile Number</label>
                  <input type="text" placeholder="9884012345" value={formData.clientPhone} onChange={e => setFormData({ ...formData, clientPhone: e.target.value })} style={inpStyle(errors.clientPhone)} />
                  {errors.clientPhone && <span style={{ color: '#ef4444', fontSize: '0.8rem' }}>{errors.clientPhone}</span>}
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                  <label>Service Area (Bengaluru)</label>
                  <select value={formData.serviceArea} onChange={e => setFormData({ ...formData, serviceArea: e.target.value })} style={inpStyle(errors.serviceArea)}>
                    <option value="">Select Service Area</option>
                    {serviceAreas.map(a => <option key={a} value={a}>{a}</option>)}
                  </select>
                  {errors.serviceArea && <span style={{ color: '#ef4444', fontSize: '0.8rem' }}>{errors.serviceArea}</span>}
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                  <label>Appliance Brand & Model</label>
                  <input type="text" placeholder="Preethi Blue Leaf, Sujata Dynamix" value={formData.applianceBrand} onChange={e => setFormData({ ...formData, applianceBrand: e.target.value })} style={inpStyle(errors.applianceBrand)} />
                  {errors.applianceBrand && <span style={{ color: '#ef4444', fontSize: '0.8rem' }}>{errors.applianceBrand}</span>}
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                  <label>Preferred Date</label>
                  <input type="date" value={formData.preferredDate} onChange={e => setFormData({ ...formData, preferredDate: e.target.value })} style={inpStyle(errors.preferredDate)} />
                  {errors.preferredDate && <span style={{ color: '#ef4444', fontSize: '0.8rem' }}>{errors.preferredDate}</span>}
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                  <label>Time Slot</label>
                  <select value={formData.preferredTimeSlot} onChange={e => setFormData({ ...formData, preferredTimeSlot: e.target.value })} style={inpStyle(errors.preferredTimeSlot)}>
                    <option value="">Select Time</option>
                    <option value="morning">Morning (8am - 12pm)</option>
                    <option value="afternoon">Afternoon (12pm - 4pm)</option>
                    <option value="evening">Evening (4pm - 8pm)</option>
                  </select>
                  {errors.preferredTimeSlot && <span style={{ color: '#ef4444', fontSize: '0.8rem' }}>{errors.preferredTimeSlot}</span>}
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                  <label>Issue Details</label>
                  <textarea rows="3" placeholder="Explain overload switch tripping, gear coupler broken, leak location, speed control failures..." value={formData.issueDescription} onChange={e => setFormData({ ...formData, issueDescription: e.target.value })} style={inpStyle(errors.issueDescription)} />
                  {errors.issueDescription && <span style={{ color: '#ef4444', fontSize: '0.8rem' }}>{errors.issueDescription}</span>}
                </div>

                <button type="submit" disabled={isSubmitting} className="btn btn-primary" style={{ justifyContent: 'center', backgroundColor: '#ff9933' }}>
                  {isSubmitting ? 'Allocating Tech...' : 'Submit Seva Ticket'}
                </button>
              </form>
            </div>
          ) : (
            <div style={{ maxWidth: '500px', margin: '0 auto', textAlign: 'center' }}>
              <div style={{ width: '64px', height: '64px', borderRadius: '50%', backgroundColor: 'rgba(16, 185, 129, 0.1)', color: '#10b981', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '2rem', margin: '0 auto 16px auto' }}>✓</div>
              <h2>Seva Booked Successfully</h2>
              <p style={{ color: 'var(--text-secondary)', marginBottom: '24px' }}>Your MixieFix diagnostic review ticket has been successfully compiled.</p>

              <div className="glass" style={{ padding: '24px', borderRadius: '16px', textAlign: 'left', display: 'flex', flexDirection: 'column', gap: '12px', border: '1px solid var(--accent-secondary)' }}>
                <div><strong>Ticket ID:</strong> <span style={{ color: '#ff9933' }}>{receipt?.id}</span></div>
                <div><strong>Client Name:</strong> {receipt?.clientName}</div>
                <div><strong>Appliance Brand:</strong> {receipt?.applianceBrand}</div>
                <div><strong>Time Schedule:</strong> {receipt?.preferredDate} ({receipt?.preferredTimeSlot})</div>
                <div><strong>Service Area:</strong> {receipt?.serviceArea}</div>
                <div style={{ backgroundColor: 'var(--bg-tertiary)', padding: '12px', borderRadius: '8px', display: 'flex', gap: '12px', alignItems: 'center' }}>
                  <span>👨‍🔧</span>
                  <div>
                    <span style={{ fontSize: '0.75rem', color: 'var(--text-muted)', display: 'block' }}>Allocated Specialist</span>
                    <strong>Ramesh Kumar (Lead Mixer Grinder Engineer)</strong>
                  </div>
                </div>
              </div>

              <button onClick={() => setWizardStep(1)} className="btn btn-secondary" style={{ marginTop: '24px' }}>Schedule Another</button>
            </div>
          )}
        </div>
      );
    };

    const inpStyle = (hasError) => ({
      width: '100%',
      padding: '10px 14px',
      borderRadius: '8px',
      border: hasError ? '2px solid #ef4444' : '1px solid var(--glass-border)',
      backgroundColor: 'var(--bg-secondary)',
      color: 'var(--text-primary)',
      outline: 'none'
    });

    // FAQ View
    const FAQView = () => {
      const [expanded, setExpanded] = useState('faq-1');

      return (
        <div style={{ padding: '64px 0 80px 0' }} className="container">
          <div style={{ textAlign: 'center', marginBottom: '48px' }}>
            <h1>FAQs & Repair Guarantees</h1>
            <p style={{ color: 'var(--text-secondary)', marginTop: '8px' }}>All details on diagnostics waivers, OEM compliance, and active parts coverage.</p>
          </div>

          <div className="faq-grid">
            <div className="glass" style={{ padding: '32px', borderRadius: '16px', border: '2px solid #ff9933' }}>
              <span style={{ padding: '4px 8px', borderRadius: '12px', backgroundColor: '#ff9933', fontSize: '0.75rem', fontWeight: 700, color: '#fff' }}>MIXIEFIX GUARANTEE</span>
              <h3 style={{ margin: '16px 0 8px 0' }}>Restoration Guarantee</h3>
              <p style={{ color: 'var(--text-secondary)', fontSize: '0.9rem', marginBottom: '16px' }}>We take mechanical tuning seriously. If any restored coupling, governor brush, or coil trips within warranty phases, we fix it completely free.</p>
              <ul>
                <li style={{ fontSize: '0.85rem', marginBottom: '4px' }}>✓ Same-day diagnostic waive</li>
                <li style={{ fontSize: '0.85rem', marginBottom: '4px' }}>✓ Insulated pure-copper parts</li>
                <li style={{ fontSize: '0.85rem' }}>✓ Comprehensive coverage</li>
              </ul>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
              {faqs.map(f => {
                const isOpen = expanded === f.id;
                return (
                  <div key={f.id} className="glass" style={{ borderRadius: '12px', overflow: 'hidden' }}>
                    <button onClick={() => setExpanded(isOpen ? null : f.id)} style={{ width: '100%', padding: '16px', display: 'flex', justifyContent: 'space-between', background: 'none', border: 'none', color: 'var(--text-primary)', fontWeight: 700, fontSize: '0.95rem', cursor: 'pointer', textAlign: 'left' }}>
                      <span>{f.question}</span>
                      <span style={{ color: '#ff9933' }}>{isOpen ? '▲' : '▼'}</span>
                    </button>
                    {isOpen && (
                      <div style={{ padding: '0 16px 16px 16px', color: 'var(--text-secondary)', fontSize: '0.9rem', borderTop: '1px solid var(--glass-border)', paddingTop: '12px' }}>
                        {f.answer}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    // Footer Component
    const Footer = () => {
      return (
        <footer style={{ backgroundColor: 'var(--bg-secondary)', borderTop: '1px solid var(--glass-border)', padding: '40px 0 20px 0', marginTop: 'auto' }}>
          <div className="container" style={{ display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: '20px', fontSize: '0.85rem', color: 'var(--text-secondary)' }}>
            <span>&copy; 2026 MixieFix India. All brand names Preethi, Ultra, Sujata are trademarks of their owners.</span>
            <div style={{ display: 'flex', gap: '16px' }}>
              <span>Helpline: +91 98840 555-FIX</span>
              <span>•</span>
              <span>Bengaluru, India</span>
            </div>
          </div>
        </footer>
      );
    };

    // Main App Routing Wrapper
    const App = () => {
      const [currentPage, setCurrentPage] = useState('home');
      const [preselectAppliance, setPreselectAppliance] = useState({ type: 'mixie', tier: 'mixie-tier-std' });

      return (
        <ThemeProvider>
          <BookingProvider>
            <Header currentPage={currentPage} setCurrentPage={setCurrentPage} />
            <main style={{ flex: 1 }}>
              {currentPage === 'home' && <HomeView setCurrentPage={setCurrentPage} setPreselectAppliance={setPreselectAppliance} />}
              {currentPage === 'services' && <ServicesView setCurrentPage={setCurrentPage} setPreselectAppliance={setPreselectAppliance} />}
              {currentPage === 'booking' && <BookingView preselectAppliance={preselectAppliance} />}
              {currentPage === 'faq' && <FAQView />}
            </main>
            <Footer />
          </BookingProvider>
        </ThemeProvider>
      );
    };

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>

</html>
